{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registrar Movimentação</title>
    <link rel="stylesheet" href="{% static 'gestao/style.css' %}">
</head>
<body>
    <h2>Movimentar Produto: {{ produto.nome }}</h2>
    <div class="card">
        <p><strong>Estoque Atual:</strong> {{ produto.quantidade_estoque }}</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="tipo">Tipo de Movimentação:</label>
                <select name="tipo" id="tipo">
                    <option value="ENTRADA">Entrada</option>
                    <option value="SAIDA">Saída</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="quantidade">Quantidade:</label>
                <input type="number" name="quantidade" id="quantidade" min="1" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Salvar Registro</button>
            <a href="{% url 'lista_produtos' %}" style="margin-left: 10px; color: #666;">Cancelar</a>
        </form>

        {% if erro %}
        <div class="error">
            {{ erro }}
        </div>
        {% endif %}
    </div>
</body>
</html>
