{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Almoxarifado - Lista de Produtos</title>
    <link rel="stylesheet" href="{% static 'gestao/style.css' %}">
</head>
<body>
    <h2>Estoque do Almoxarifado (Base da Prova)</h2>
    
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Quantidade em Estoque</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for produto in produtos %}
            <tr>
                <td>{{ produto.nome }}</td>
                <td>{{ produto.quantidade_estoque }}</td>
                <td>
                    <a href="{% url 'registrar_movimentacao' produto.id %}" class="btn">Movimentar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">Nenhum produto cadastrado no banco ainda.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
